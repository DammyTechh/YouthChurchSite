# Records the Morning Devotion broadcast every day from 05:14 to ~05:31
# Africa/Lagos. Refuses to record at the wrong time even if GitHub
# cron is severely delayed.

name: Radio Recorder (Morning Devotion)

on:
  schedule:
    # 03:30 UTC = 04:30 Lagos. 44 min buffer for GitHub cron delays.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "test = record now (60s default) | production = wait for next 05:14 Lagos"
        required: false
        default: "test"
        type: choice
        options: [test, production]
      duration_seconds:
        description: "Recording length in seconds (only used in test mode; default 60)"
        required: false
        default: "60"

jobs:
  record:
    name: Capture & upload morning broadcast
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WEBHOOK_SECRET: ${{ secrets.RADIO_RECORDER_WEBHOOK_SECRET }}
          STREAM_URL: ${{ secrets.RADIO_STREAM_URL }}
        run: |
          missing=""
          [ -z "$SUPABASE_URL"   ] && missing="$missing SUPABASE_URL"
          [ -z "$SERVICE_ROLE"   ] && missing="$missing SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$WEBHOOK_SECRET" ] && missing="$missing RADIO_RECORDER_WEBHOOK_SECRET"
          [ -z "$STREAM_URL"     ] && missing="$missing RADIO_STREAM_URL"
          [ -n "$missing" ] && { echo "::error::Missing secrets:$missing"; exit 1; }
          echo "All secrets present."

      - name: Install ffmpeg + curl + jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg curl jq

      - name: Determine mode + show current Lagos time
        id: ctx
        run: |
          export TZ="Africa/Lagos"
          NOW_LAGOS_HMS="$(date '+%H:%M:%S')"
          BCAST_DATE="$(date '+%F')"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="production"
          else
            MODE="${{ github.event.inputs.mode }}"
            [ -z "$MODE" ] && MODE="test"
          fi
          echo "Current Lagos time: $NOW_LAGOS_HMS"
          echo "Broadcast date: $BCAST_DATE"
          echo "Mode: $MODE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "broadcast_date=$BCAST_DATE" >> "$GITHUB_OUTPUT"

      - name: Verify we can hit the 05:14 Lagos window
        if: steps.ctx.outputs.mode == 'production'
        run: |
          export TZ="Africa/Lagos"
          NOW_S="$(date +%s)"
          OPEN_S="$(date -d 'today 05:14:00' +%s)"
          CLOSE_S="$(date -d 'today 05:31:00' +%s)"
          if [ "$NOW_S" -ge "$CLOSE_S" ]; then
            echo "::error::Cron fired AFTER the broadcast window ended (now > 05:31 Lagos)."
            echo "Today's broadcast was missed due to GitHub cron delay. No recording made."
            exit 1
          fi
          if [ "$NOW_S" -lt "$OPEN_S" ]; then
            DIFF=$(( OPEN_S - NOW_S ))
            MIN=$(( DIFF / 60 ))
            echo "Sleeping ${MIN}m until 05:14 Lagos..."
            sleep "$DIFF"
            echo "Reached 05:14 Lagos."
          else
            LATE=$(( NOW_S - OPEN_S ))
            MIN=$(( LATE / 60 ))
            echo "::warning::Cron fired ${MIN} min after 05:14. Capturing remaining time."
          fi

      - name: Check for existing real recording (test mode)
        if: steps.ctx.outputs.mode == 'test'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BCAST_DATE: ${{ steps.ctx.outputs.broadcast_date }}
        run: |
          set -e
          RES=$(curl -sS \
            "${SUPABASE_URL}/rest/v1/radio_recordings?broadcast_date=eq.${BCAST_DATE}&program_name=eq.Morning%20Devotion&select=duration_seconds" \
            -H "apikey: ${SERVICE_ROLE}" \
            -H "Authorization: Bearer ${SERVICE_ROLE}")
          DUR=$(echo "$RES" | jq -r '.[0].duration_seconds // 0')
          echo "Existing duration today: ${DUR}s"
          if [ "$DUR" -ge 600 ]; then
            echo "::error::Today already has a real recording (${DUR}s). Refusing to overwrite."
            exit 1
          fi

      - name: Compute recording duration
        id: dur
        run: |
          export TZ="Africa/Lagos"
          if [ "${{ steps.ctx.outputs.mode }}" = "test" ]; then
            D="${{ github.event.inputs.duration_seconds }}"
            [ -z "$D" ] && D=60
            echo "Test mode — recording $D seconds"
          else
            NOW_S="$(date +%s)"
            CLOSE_S="$(date -d 'today 05:31:00' +%s)"
            D=$(( CLOSE_S - NOW_S ))
            [ "$D" -le 0 ] && { echo "::error::No time left in window"; exit 1; }
            [ "$D" -gt 1200 ] && D=1200
            echo "Production mode — recording $D seconds"
          fi
          echo "duration=$D" >> "$GITHUB_OUTPUT"

      - name: Test stream URL reachability
        env:
          STREAM_URL: ${{ secrets.RADIO_STREAM_URL }}
        run: |
          set +e
          HTTP=$(curl -sS -o /tmp/probe -w "%{http_code}" --max-time 8 "$STREAM_URL" || true)
          echo "Stream HTTP: $HTTP"
          [ "$HTTP" = "000" ] && { echo "::error::Stream unreachable"; exit 1; }
          [ "$HTTP" -ge 400 ] && [ "$HTTP" -lt 500 ] && { echo "::error::Stream HTTP $HTTP"; exit 1; }

      - name: Record stream with ffmpeg
        id: record
        env:
          STREAM_URL: ${{ secrets.RADIO_STREAM_URL }}
          DURATION: ${{ steps.dur.outputs.duration }}
        run: |
          set -e
          export TZ="Africa/Lagos"
          STARTED_AT="$(date -u +%FT%TZ)"
          STARTED_LAGOS="$(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Recording starts: $STARTED_LAGOS"
          ffmpeg -hide_banner -loglevel info \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -i "$STREAM_URL" \
            -t "$DURATION" \
            -vn -ac 2 -ar 44100 \
            -af "loudnorm=I=-16:TP=-1.5:LRA=11,highpass=f=80,lowpass=f=15000" \
            -codec:a libmp3lame -b:a 128k \
            recording.mp3 2>&1 | tail -20
          [ ! -s "recording.mp3" ] && { echo "::error::Empty file"; exit 1; }
          SIZE="$(stat -c%s recording.mp3)"
          DUR="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 recording.mp3 | cut -d. -f1)"
          echo "started_at=$STARTED_AT" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "duration=$DUR" >> "$GITHUB_OUTPUT"
          echo "Captured ${SIZE} bytes / ${DUR} seconds"

      - name: Upload to Supabase Storage
        id: upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BCAST_DATE: ${{ steps.ctx.outputs.broadcast_date }}
        run: |
          set -e
          STORAGE_PATH="radio/${BCAST_DATE}.mp3"
          UPLOAD_URL="${SUPABASE_URL}/storage/v1/object/radio-recordings/${STORAGE_PATH}"
          HTTP=$(curl -sS -o upload.json -w "%{http_code}" -X POST "$UPLOAD_URL" \
            -H "Authorization: Bearer ${SERVICE_ROLE}" \
            -H "apikey: ${SERVICE_ROLE}" \
            -H "Content-Type: audio/mpeg" \
            -H "x-upsert: true" \
            --data-binary @recording.mp3)
          echo "HTTP $HTTP"
          cat upload.json
          echo ""
          [ "$HTTP" -ge 300 ] && exit 1
          echo "storage_path=$STORAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Register recording row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.RADIO_RECORDER_WEBHOOK_SECRET }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BCAST_DATE: ${{ steps.ctx.outputs.broadcast_date }}
          STARTED_AT: ${{ steps.record.outputs.started_at }}
          STORAGE_PATH: ${{ steps.upload.outputs.storage_path }}
          DURATION: ${{ steps.record.outputs.duration }}
          SIZE: ${{ steps.record.outputs.size }}
        run: |
          set -e
          ENDED_AT="$(date -u +%FT%TZ)"
          PAYLOAD=$(jq -n \
            --arg date "$BCAST_DATE" --arg started "$STARTED_AT" \
            --arg ended "$ENDED_AT" --arg path "$STORAGE_PATH" \
            --argjson dur "${DURATION:-0}" --argjson size "${SIZE:-0}" \
            '{broadcast_date: $date, broadcast_started_at: $started, broadcast_ended_at: $ended,
              storage_path: $path, duration_seconds: $dur, file_size_bytes: $size,
              program_name: "Morning Devotion", title: ("Morning Devotion — " + $date)}')
          HTTP=$(curl -sS -o register.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/radio-recorder" \
            -H "Authorization: Bearer ${SERVICE_ROLE}" \
            -H "apikey: ${SERVICE_ROLE}" \
            -H "Content-Type: application/json" \
            -H "x-recorder-secret: ${WEBHOOK_SECRET}" \
            -d "$PAYLOAD")
          echo "HTTP $HTTP"
          cat register.json
          echo ""
          [ "$HTTP" -ge 300 ] && exit 1
          echo "Recording registered."

      - name: Upload artifact (debug copy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-devotion-${{ steps.ctx.outputs.broadcast_date }}
          path: recording.mp3
          retention-days: 7
          if-no-files-found: ignore
